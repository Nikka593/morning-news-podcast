# =====================================================================
# config.yaml — この番組の設定ファイル
# ここだけ編集すれば、ニュースソースや番組の雰囲気を変えられます。
# コード（scriptsフォルダの中身）は触らなくてOKです。
# =====================================================================

# ------- 番組の基本情報（Podcastアプリに表示されます）-------
show:
  title: "今日の朝ニュース"                    # 番組名
  author: "Naotaro"                            # 作者名
  description: "毎朝6時、政治・経済・テックのニュースを事実ベースで10分お届けする自動生成ラジオ。"
  language: "ja"
  # ↓GitHub Pagesで公開したときのURL（後で手順書に従って書き換えます）
  base_url: "https://Nikka593.github.io/morning-news-podcast"

# ------- ニュースソース（RSS）-------
# 増やしたい/減らしたいときはこの行を編集。genre はナレーションの区切りに使います。
feeds:
  - genre: "政治"
    url: "https://www.nhk.or.jp/rss/news/cat4.xml"
    max_items: 4
  - genre: "ビジネス・経済"
    url: "https://news.yahoo.co.jp/rss/topics/business.xml"
    max_items: 4
  - genre: "IT・テック"
    url: "https://news.yahoo.co.jp/rss/topics/it.xml"
    max_items: 4

total_items: 12          # 1エピソードで扱うニュースの合計本数の目安

# ------- ナレーションの雰囲気 -------
persona:
  # 声: edge-tts / Gemini 共通で「female」か「male」で指定
  gender: "female"
  # ↓Geminiに渡す「口調の指示」。ここを変えると語り口が変わります。
  tone: |
    あなたは朝のニュース番組のアナウンサーです。
    事実として起きたことを、正確かつ中立に伝えてください。
    - 個人の感想・意見・評価・推測（「〜だと嬉しいですね」「気になりますね」等）は入れない
    - 「いつ・誰が・何を・どうした」を明確にし、数字や固有名詞は省略しない
    - 背景の補足は、確認されている事実の範囲でのみ行う
    - 専門用語は事実ベースで一言だけ言い換える
    - 冒頭は日付と番組名を告げる簡潔な挨拶のみ、最後は「以上、今朝のニュースでした」で締める
    - 落ち着いた、聞き取りやすい話し方

# ------- エピソード保持数（古いものは自動削除）-------
keep_episodes: 14
