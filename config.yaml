# =====================================================================
# config.yaml — この番組の設定ファイル
# ここだけ編集すれば、ニュースソースや番組の雰囲気を変えられます。
# コード（scriptsフォルダの中身）は触らなくてOKです。
# =====================================================================

# ------- 番組の基本情報（Podcastアプリに表示されます）-------
show:
  title: "今日の朝ニュース"                    # 番組名
  author: "Naotaro"                            # 作者名
  description: "毎朝6時、総合・テック・経済のニュースを10分でお届けする自動生成ラジオ。"
  language: "ja"
  # ↓GitHub Pagesで公開したときのURL（後で手順書に従って書き換えます）
  base_url: "https://Nikka593.github.io/morning-news-podcast"

# ------- ニュースソース（RSS）-------
# 増やしたい/減らしたいときはこの行を編集。genre はナレーションの区切りに使います。
feeds:
  - genre: "総合"
    url: "https://news.yahoo.co.jp/rss/topics/top-picks.xml"
    max_items: 4        # このソースから拾う最大本数
  - genre: "IT・テック"
    url: "https://news.yahoo.co.jp/rss/topics/it.xml"
    max_items: 4
  - genre: "IT・テック"
    url: "https://rss.itmedia.co.jp/rss/2.0/aiplus.xml"
    max_items: 2
  - genre: "ビジネス・経済"
    url: "https://news.yahoo.co.jp/rss/topics/business.xml"
    max_items: 4

total_items: 12          # 1エピソードで扱うニュースの合計本数の目安

# ------- ナレーションの雰囲気 -------
persona:
  # 声: edge-tts / Gemini 共通で「female」か「male」で指定
  gender: "female"
  # ↓Geminiに渡す「口調の指示」。ここを変えると語り口が変わります。
  tone: |
    あなたは朝のラジオ番組の1人のパーソナリティです。
    リスナーにやさしく語りかけるカジュアルな口調で、堅くなりすぎず、
    でも品よく、聞いていて心地よいトーンで話してください。
    専門用語が出たら一言だけかみ砕いて補足します。
    番組の冒頭で軽く挨拶し、最後は「いってらっしゃい」で締めます。

# ------- エピソード保持数（古いものは自動削除）-------
keep_episodes: 14
